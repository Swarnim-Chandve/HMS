<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HMS — Dashboard</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header id="app-header">
    <div>
      <strong>HMS</strong>
      <span class="user-info" id="header-user"></span>
    </div>
    <div>
      <a href="/docs" class="btn secondary" style="padding: 0.35rem 0.75rem">API docs</a>
      <button type="button" class="secondary" id="btn-logout">Sign out</button>
    </div>
  </header>
  <div class="app-layout">
    <aside id="sidebar"></aside>
    <main id="content">
      <section class="view" id="view-home">
        <h2>Home</h2>
        <div class="form-card" id="me-box"></div>
        <div class="form-card" id="box-reception" data-roles="admin" hidden>
          <h3 style="margin-top:0;font-size:1rem">Add receptionist</h3>
          <form id="form-reception">
            <div class="grid-2">
              <div><label>Email</label><input name="email" type="text" required /></div>
              <div><label>Password</label><input name="password" type="password" minlength="8" required /></div>
            </div>
            <label>Full name</label>
            <input name="full_name" type="text" required />
            <button type="submit">Create receptionist</button>
          </form>
        </div>
      </section>

      <section class="view" id="view-doctors" hidden>
        <h2>Doctors</h2>
        <div class="form-card" id="form-card-doctor">
          <h3 style="margin-top:0;font-size:1rem">Add doctor</h3>
          <form id="form-doctor">
            <div class="grid-2">
              <div><label>Email</label><input name="email" required /></div>
              <div><label>Password</label><input name="password" type="password" minlength="8" required /></div>
            </div>
            <label>Full name</label>
            <input name="full_name" required />
            <div class="grid-2">
              <div><label>Specialization</label><input name="specialization" /></div>
              <div><label>License</label><input name="license_number" /></div>
            </div>
            <label>Department</label>
            <input name="department" />
            <button type="submit">Add doctor</button>
          </form>
        </div>
        <div class="form-card"><div id="table-doctors"></div></div>
      </section>

      <section class="view" id="view-patients" hidden>
        <h2>Patients</h2>
        <div class="form-card" id="form-card-patient" data-roles="admin receptionist" hidden>
          <h3 style="margin-top:0;font-size:1rem">Add patient</h3>
          <form id="form-patient">
            <div class="grid-2">
              <div><label>Email</label><input name="email" required /></div>
              <div><label>Password</label><input name="password" type="password" minlength="8" required /></div>
            </div>
            <label>Full name</label>
            <input name="full_name" required />
            <div class="grid-2">
              <div><label>Date of birth</label><input name="date_of_birth" type="date" /></div>
              <div><label>Phone</label><input name="phone" /></div>
            </div>
            <label>Address</label>
            <input name="address" />
            <label>Emergency contact</label>
            <input name="emergency_contact" />
            <button type="submit">Add patient</button>
          </form>
        </div>
        <div class="form-card"><div id="table-patients"></div></div>
      </section>

      <section class="view" id="view-appointments" hidden>
        <h2>Appointments</h2>
        <div class="form-card">
          <h3 style="margin-top:0;font-size:1rem">New appointment</h3>
          <form id="form-appointment">
            <div class="grid-2" id="appt-patient-wrap">
              <div><label>Patient ID</label><input name="patient_id" type="number" min="1" id="in-patient-id" /></div>
            </div>
            <div class="grid-2">
              <div><label>Doctor</label>
                <select name="doctor_id" id="sel-doctor" required></select>
              </div>
              <div><label>Date & time</label>
                <input name="scheduled_at" id="in-appt-time" type="datetime-local" required />
              </div>
            </div>
            <label>Reason</label>
            <input name="reason" />
            <button type="submit">Book</button>
          </form>
        </div>
        <div class="form-card"><div id="table-appointments"></div></div>
      </section>

      <section class="view" id="view-records" hidden>
        <h2>Medical records</h2>
        <div class="form-card">
          <p class="hint" id="record-filter-hint" style="margin-top:0">Doctors: enter patient id to list records, or use filter below after listing.</p>
          <form id="form-record">
            <div class="grid-2">
            <div><label>Patient ID</label><input name="patient_id" type="number" min="1" id="rec-pid" required /></div>
            <div><label>Doctor ID</label><input name="doctor_id" type="number" min="1" id="rec-did" required /></div>
            </div>
            <div><label>Appointment ID (optional)</label><input name="appointment_id" type="number" id="rec-aid" /></div>
            <div style="grid-column:1/-1">
              <label>Diagnosis</label>
              <input name="diagnosis" />
            </div>
            <div class="grid-2">
            <div><label>Notes</label><textarea name="notes"></textarea></div>
            <div><label>Prescription</label><textarea name="prescription"></textarea></div>
            </div>
            <div>
              <button type="submit">Save record</button>
            </div>
          </form>
        </div>
        <div class="form-card">
          <label>Filter by patient (list)</label>
          <input type="number" id="list-rec-pid" class="inline-field" min="1" placeholder="Patient id" />
          <button type="button" class="secondary" id="btn-load-records">Load</button>
        </div>
        <div class="form-card"><div id="table-records"></div></div>
      </section>

      <section class="view" id="view-invoices" hidden>
        <h2>Invoices</h2>
        <div class="form-card" id="form-card-invoice" data-roles="admin receptionist" hidden>
          <h3 style="margin-top:0;font-size:1rem">New invoice</h3>
          <form id="form-invoice">
            <div class="grid-2">
              <div><label>Patient ID</label><input name="patient_id" type="number" min="1" required /></div>
              <div><label>Appointment ID (optional)</label><input name="appointment_id" type="number" /></div>
            </div>
            <div class="grid-2">
              <div><label>Due date</label><input name="due_date" type="date" /></div>
            </div>
            <label>Description</label>
            <input name="description" />
            <p class="hint">Line items (at least one row with description + unit price):</p>
            <div class="lines-box" id="inv-lines">
              <div class="grid-2 inv-line">
                <div><label>Description</label><input class="d" placeholder="e.g. Consultation" /></div>
                <div><label>Qty</label><input class="q" type="number" value="1" min="0" step="0.01" /></div>
                <div><label>Unit price</label><input class="u" type="number" value="0" min="0" step="0.01" /></div>
              </div>
            </div>
            <button type="button" class="secondary" id="btn-add-line">Add line</button>
            <br /><br />
            <button type="submit" id="btn-inv-submit">Create invoice</button>
          </form>
        </div>
        <div class="form-card"><div id="table-invoices"></div></div>
      </section>
    </main>
  </div>
  <div id="toast"></div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
